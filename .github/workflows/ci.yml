name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - '**.md'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: パッケージマネージャーをセットアップ
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: 依存パッケージをインストール
        run: bun install

      - name: lint を実行
        run: bun run lint

      - name: 型チェックを実行
        run: bun run check-types

      - name: ユニットテストを実行
        run: bun run test

      # - name: Playwright ブラウザをインストール
